spring.application.name=ip-backend
 
# ===============================
# Supabase Database
# ===============================
 
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}?sslmode=require
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
 
# ===============================
# JPA Settings
# ===============================
 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
 
# ===============================
# Hikari Pool
# ===============================
 
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
 
# ===============================
# Server
# ===============================
 
server.port=8081
 
# ===============================
# JWT
# ===============================
 
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-ms=3600000
jwt.refresh-token-expiry-ms=604800000
 
# ===============================
# Google OAuth
# ===============================
 
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
 
# ===============================
# Mail
# ===============================
 
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 
